{% extends "base.html" %}
{% block title %}Reset password · GlideCast — Wax Done Right{% endblock %}
{% block content %}
  <div class="card-glass scroll-anim-card" style="max-width: 28rem; padding: 1.5rem;">
    <p class="text-caption" style="margin: 0 0 0.5rem 0;">GlideCast<sup class="mark-tm">™</sup></p>
    <h1 class="text-section-title" style="font-size: 1.5rem; margin: 0 0 0.25rem 0;">Reset password</h1>
    <p class="text-caption" style="margin-bottom: 1.5rem;">We’ll email you a reset link.</p>
    <form method="post" style="display: flex; flex-direction: column; gap: 1rem;">
      {% csrf_token %}
      <div class="input-wrap">
        <label for="id_email">Email</label>
        <input type="email" name="email" id="id_email" class="input-dark" required />
      </div>
      <button type="submit" class="btn-primary">Send reset link</button>
    </form>
  </div>
{% endblock %}
